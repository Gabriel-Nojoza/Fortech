<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark navy background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#1a2535"/>

  <!-- Teal rounded square container -->
  <rect x="10" y="10" width="80" height="80" rx="16" ry="16" fill="#0e7490"/>

  <!-- Green bar 1 (left, short) -->
  <rect x="18" y="46" width="16" height="28" rx="3" fill="#84cc16"/>

  <!-- Green bar 2 (middle, tall) -->
  <rect x="42" y="28" width="16" height="46" rx="3" fill="#84cc16"/>

  <!-- Green bar 3 (right, medium) -->
  <rect x="66" y="36" width="16" height="38" rx="3" fill="#84cc16"/>

  <!-- Dark line chart overlay (mountain/wave) -->
  <path
    d="M10 72 Q22 58 32 65 Q44 72 56 52 Q68 32 90 45 L90 90 Q90 90 10 90 Z"
    fill="#1a2535"
    opacity="0.85"
  />

  <!-- Line stroke on top of fill -->
  <path
    d="M10 72 Q22 58 32 65 Q44 72 56 52 Q68 32 90 45"
    fill="none"
    stroke="#1a2535"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Teal bottom sections (visible between chart line and bottom) -->
  <path
    d="M10 76 Q22 62 32 69 Q44 76 56 56 Q68 36 90 49 L90 90 Q82 90 10 90 Z"
    fill="#0e7490"
    opacity="0.5"
  />
</svg>
